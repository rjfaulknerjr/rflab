# === Back-end servers (10.200.107.0/24) ===
add server FSI-DC1-LRFWEB1 10.200.107.116
add server FSI-DC1-LRFWEB2 10.200.107.118
add server FSI-DC1-LRFWEB3 10.200.107.117

# === Service Group (HTTP) ===
add serviceGroup SG-FSI-LRF-HTTP HTTP
bind serviceGroup SG-FSI-LRF-HTTP FSI-DC1-LRFWEB1 80
bind serviceGroup SG-FSI-LRF-HTTP FSI-DC1-LRFWEB2 80
bind serviceGroup SG-FSI-LRF-HTTP FSI-DC1-LRFWEB3 80

# === Health monitor: HTTP-ECV on /healthz expecting "OK" ===
add lb monitor MON-FSI-LRF-HTTPZ HTTP-ECV -send "GET /healthz" -recv "OK" -LRTM DISABLED
bind serviceGroup SG-FSI-LRF-HTTP -monitorName MON-FSI-LRF-HTTPZ

# === LB vServer (VIP 10.200.107.151:80) ===
add lb vserver LBV-FSI-LRF-HTTP HTTP 10.200.107.151 80 -lbMethod ROUNDROBIN -persistencetype NONE
bind lb vserver LBV-FSI-LRF-HTTP SG-FSI-LRF-HTTP

save config
